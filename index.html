<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <main class="calculator" aria-label="Calculator">
            <header class="toolbar">
                <div class="brand">
                    <p class="brand-title">Calculator</p>
                    <p class="brand-subtitle">Modern UI + history</p>
                </div>
                <div class="toolbar-actions">
                    <span id="theme-mode-label" class="mode-pill">Theme: Dark</span>
                    <button id="theme-toggle" class="icon-button" type="button" aria-label="Toggle theme">🌙</button>
                    <button id="sound-toggle" class="icon-button" type="button" aria-label="Toggle sound">🔊</button>
                </div>
            </header>

            <section class="display-panel">
                <div id="preview-display" class="preview-display" aria-live="polite">Ready to calculate</div>
                <input id="display" class="main-display" type="text" disabled value="0" aria-label="Calculator display">
            </section>

            <section class="buttons-grid" aria-label="Calculator buttons">
                <button class="button function-button" data-action="clear" type="button">C</button>
                <button class="button function-button" data-action="delete" type="button">⌫</button>
                <button class="button function-button" data-value="%" type="button">%</button>
                <button class="button operator-button" data-value="/" type="button">÷</button>

                <button class="button" data-value="7" type="button">7</button>
                <button class="button" data-value="8" type="button">8</button>
                <button class="button" data-value="9" type="button">9</button>
                <button class="button operator-button" data-value="*" type="button">×</button>

                <button class="button" data-value="4" type="button">4</button>
                <button class="button" data-value="5" type="button">5</button>
                <button class="button" data-value="6" type="button">6</button>
                <button class="button operator-button" data-value="-" type="button">−</button>

                <button class="button" data-value="1" type="button">1</button>
                <button class="button" data-value="2" type="button">2</button>
                <button class="button" data-value="3" type="button">3</button>
                <button class="button operator-button" data-value="+" type="button">+</button>

                <button class="button zero-button" data-value="0" type="button">0</button>
                <button class="button" data-value="." type="button">.</button>
                <button class="button equals-button" data-action="equals" type="button">=</button>
            </section>

            <section class="history-section">
                <div class="history-header">
                    <div>
                        <p class="history-title">History</p>
                        <p class="history-subtitle">Click an item to reuse it</p>
                    </div>
                    <div class="history-controls">
                        <button id="clear-history" class="text-button" type="button">Clear</button>
                        <button id="history-toggle" class="text-button" type="button">Hide</button>
                    </div>
                </div>
                <div id="history-content" class="history-content">
                    <ul id="history-list" class="history-list" role="list"></ul>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
